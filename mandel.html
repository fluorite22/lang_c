<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Множество Мандельброта</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        canvas {
            border: 1px solid #000;
            margin-top: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        .controls {
            margin-bottom: 10px;
        }
        button {
            padding: 8px 16px;
            margin: 0 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Множество Мандельброта</h1>
    <div class="controls">
        <button id="resetBtn">Сброс</button>
        <label>Макс. итераций: <input type="number" id="maxIterations" value="25" min="10" max="1000"></label>
    </div>
    <canvas id="mandelbrotCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('mandelbrotCanvas');
        const ctx = canvas.getContext('2d');
        const resetBtn = document.getElementById('resetBtn');
        const maxIterationsInput = document.getElementById('maxIterations');

        // Параметры для множества Мандельброта
        let xMin = -2.5, xMax = 1.0;
        let yMin = -1.5, yMax = 1.5;
        let maxIterations = parseInt(maxIterationsInput.value);

        // Функция для проверки, принадлежит ли точка множеству Мандельброта
        function mandelbrot(cReal, cImag, maxIter) {
            let zReal = 0, zImag = 0;
            let iter = 0;

            while (iter < maxIter) {
                // z = z^2 + c
                const zRealNew = zReal * zReal - zImag * zImag + cReal;
                const zImagNew = 2 * zReal * zImag + cImag;

                zReal = zRealNew;
                zImag = zImagNew;

                // Проверка на выход за границу (радиус 2)
                if (zReal * zReal + zImag * zImag > 4) {
                    return iter;
                }
                iter++;
            }
            return maxIter;
        }

        // Преобразование координат экрана в координаты комплексной плоскости
        function mapToComplex(x, y) {
            const cReal = xMin + (x / canvas.width) * (xMax - xMin);
            const cImag = yMin + (y / canvas.height) * (yMax - yMin);
            return { real: cReal, imag: cImag };
        }

        // Функция для получения цвета на основе количества итераций
        function getColor(iterations, maxIter) {
            if (iterations === maxIter) {
                return [0, 0, 0]; // Чёрный для точек внутри множества
            } else {
                // Плавный переход цветов
                const hue = (iterations / maxIter) * 360;
                return hslToRgb(hue, 100, 50);
            }
        }

        // Конвертация HSL в RGB
        function hslToRgb(h, s, l) {
            s /= 100;
            l /= 100;
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const x = c * (1 - Math.abs((h / 60) % 2 - 1));
            const m = l - c / 2;
            let r = 0, g = 0, b = 0;

            if (0 <= h && h < 60) {
                r = c; g = x; b = 0;
            } else if (60 <= h && h < 120) {
                r = x; g = c; b = 0;
            } else if (120 <= h && h < 180) {
                r = 0; g = c; b = x;
            } else if (180 <= h && h < 240) {
                r = 0; g = x; b = c;
            } else if (240 <= h && h < 300) {
                r = x; g = 0; b = c;
            } else if (300 <= h && h < 360) {
                r = c; g = 0; b = x;
            }

            return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
        }

        // Основная функция отрисовки
        function drawMandelbrot() {
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            const data = imageData.data;

            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const complex = mapToComplex(x, y);
                    const iterations = mandelbrot(complex.real, complex.imag, maxIterations);
                    const [r, g, b] = getColor(iterations, maxIterations);

                    // Установка цвета пикселя
                    const pixelIndex = (y * canvas.width + x) * 4;
            data[pixelIndex] = r;     // Красный
            data[pixelIndex + 1] = g; // Зелёный
            data[pixelIndex + 2] = b; // Синий
            data[pixelIndex + 3] = 255; // Альфа (непрозрачность)
        }
    }

    // Отрисовка на canvas
    ctx.putImageData(imageData, 0, 0);
}

// Обработчики событий
resetBtn.addEventListener('click', () => {
    xMin = -2.5; xMax = 1.0;
    yMin = -1.5; yMax = 1.5;
    maxIterations = parseInt(maxIterationsInput.value);
    drawMandelbrot();
});

maxIterationsInput.addEventListener('change', () => {
    maxIterations = parseInt(maxIterationsInput.value);
    drawMandelbrot();
});

// Первоначальная отрисовка
drawMandelbrot();
    </script>
</body>
</html>
